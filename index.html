
HTML<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galactic Quiz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            background: linear-gradient(45deg, #0a001f, #1a0033, #000428);
            color: white;
            overflow-y: auto;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.15) 0%, transparent 2%),
                        radial-gradient(circle at 50% 70%, rgba(255,255,255,0.12) 0%, transparent 2%),
                        radial-gradient(circle at 80% 40%, rgba(255,255,255,0.18) 0%, transparent 2%);
            background-size: 300px 300px;
            animation: stars 80s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes stars { 0% { background-position: 0 0; } 100% { background-position: -300px -300px; } }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px 100px;
            text-align: center;
        }

        h1 { font-size: 3rem; margin-bottom: 5px; text-shadow: 0 0 20px rgba(138, 43, 226, 0.8); }

        .score {
            font-size: 1.8rem;
            color: #ffd700;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 1100px;
            margin: 30px auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(138, 43, 226, 0.3);
            border-radius: 15px;
            padding: 20px 15px;
            min-height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: all 0.4s ease;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        .card:hover { transform: translateY(-10px) scale(1.05); background: rgba(138, 43, 226, 0.25); }

        .header-card {
            background: rgba(155, 89, 182, 0.3);
            border: 2px solid #ffd700;
            cursor: default;
            font-size: 1.3rem;
            font-weight: bold;
        }

        .completed { background: rgba(0, 200, 0, 0.2); border-color: #00ff00; pointer-events: none; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.92);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: linear-gradient(145deg, #1a0033, #2a0055);
            border: 3px solid #9b59b6;
            border-radius: 20px;
            width: 90%;
            max-width: 700px;
            padding: 30px;
            box-shadow: 0 0 40px rgba(155, 89, 182, 0.8);
        }

        .modal h2 { color: #ffd700; margin-bottom: 15px; font-size: 1.8rem; }
        .difficulty { font-size: 1.1rem; margin-bottom: 15px; color: #aaa; }

        .option {
            background: rgba(255,255,255,0.1);
            border: 2px solid #9b59b6;
            margin: 12px 0;
            padding: 16px;
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .option:hover { background: rgba(155, 89, 182, 0.3); transform: scale(1.03); }
        .option.correct { background: #00cc00; border-color: #00ff00; }
        .option.wrong { background: #cc0000; border-color: #ff4444; }

        .close { float: right; font-size: 2.5rem; cursor: pointer; color: #aaa; }
        .btn { padding: 12px 20px; margin: 10px 5px; border: none; border-radius: 10px; cursor: pointer; font-size: 1rem; }
        .btn-new { background: #6c3483; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌌 GALACTIC QUIZ</h1>
        <div class="score">Puntuación Total: <span id="totalScore">0</span> pts</div>
        <p>Elige tu zona y nivel de dificultad</p>
        <div class="grid" id="grid"></div>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">×</span>
            <h2 id="question"></h2>
            <p id="difficulty" class="difficulty"></p>
            <div id="options"></div>
            <div style="margin-top: 25px;">
                <button class="btn btn-new" onclick="newRandomQuestion()">Nueva Pregunta</button>
                <button class="btn" onclick="closeModal()" style="background:#555;">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        let totalScore = 0;
        const answered = new Set(); // Para evitar responder dos veces la misma casilla

        // ==================== PREGUNTAS POR COLUMNA ====================
        const categories = ["ASTRONOMÍA", "PLANETAS", "COSMOS"];

        const columns = [
            // Columna 1 - Astronomía
            {
                easy: [
                    { q: "¿Cuál es la estrella más cercana al Sol?", a: ["A) Sirio", "B) Alfa Centauri", "C) Betelgeuse", "D) Proxima Centauri"], c: 3 },
                    { q: "¿Qué planeta es conocido como el 'Planeta Rojo'?", a: ["A) Venus", "B) Marte", "C) Júpiter", "D) Saturno"], c: 1 }
                ],
                medium: [
                    { q: "¿Cuántos planetas hay en el Sistema Solar?", a: ["A) 7", "B) 8", "C) 9", "D) 10"], c: 1 },
                    { q: "¿En qué año llegó el hombre a la Luna?", a: ["A) 1965", "B) 1969", "C) 1972", "D) 1975"], c: 1 }
                ],
                hard: [
                    { q: "¿Qué es un agujero negro?", a: ["A) Una estrella muy brillante", "B) Una región del espacio con gravedad extrema", "C) Un planeta sin luz", "D) Una nube de polvo cósmico"], c: 1 }
                ]
            },
            // Columna 2 - Planetas (agrega más preguntas aquí)
            { easy: [], medium: [], hard: [] },
            // Columna 3 - Cosmos (agrega más preguntas aquí)
            { easy: [], medium: [], hard: [] }
        ];

        const grid = document.getElementById('grid');
        let currentQuestions = [];
        let currentLevel = '';
        let currentPoints = 0;

        // Crear tarjetas
        for (let row = 0; row < 6; row++) {
            for (let col = 0; col < 3; col++) {
                const card = document.createElement('div');
                const cardId = `${row}-${col}`;

                if (row === 0) {
                    card.className = 'card header-card';
                    card.innerHTML = `<div><h3>${categories[col]}</h3></div>`;
                } else {
                    let difficulty = (row <= 2) ? 'easy' : (row <= 4) ? 'medium' : 'hard';
                    let levelName = difficulty === 'easy' ? 'Fácil' : difficulty === 'medium' ? 'Medio' : 'Difícil';
                    let points = difficulty === 'easy' ? 2000 : difficulty === 'medium' ? 5000 : 10000;

                    card.className = 'card';
                    card.innerHTML = `
                        <div>
                            <h3>Zona ${row}-${col+1}</h3>
                            <p>${levelName} - ${points} pts</p>
                        </div>
                    `;

                    card.addEventListener('click', () => {
                        if (answered.has(cardId)) {
                            alert("Ya respondiste esta casilla.");
                            return;
                        }
                        currentQuestions = columns[col][difficulty];
                        currentLevel = levelName;
                        currentPoints = points;
                        showRandomQuestion(cardId);
                    });
                }
                grid.appendChild(card);
            }
        }

        function showRandomQuestion(cardId) {
            if (currentQuestions.length === 0) {
                alert("No hay preguntas en este nivel todavía.");
                return;
            }

            const randomIndex = Math.floor(Math.random() * currentQuestions.length);
            const q = currentQuestions[randomIndex];
            
            document.getElementById('question').textContent = q.q;
            document.getElementById('difficulty').textContent = `Nivel: ${currentLevel} — ${currentPoints} puntos`;
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';

            q.a.forEach((answer, idx) => {
                const option = document.createElement('div');
                option.className = 'option';
                option.textContent = answer;
                option.onclick = () => confirmAnswer(idx, q.c, option, cardId);
                optionsDiv.appendChild(option);
            });
            
            document.getElementById('modal').style.display = 'flex';
        }

        function confirmAnswer(selected, correct, element, cardId) {
            if (confirm("¿Estás seguro de que esta es tu respuesta?")) {
                checkAnswer(selected, correct, cardId);
            }
        }

        function checkAnswer(selected, correct, cardId) {
            const allOptions = document.querySelectorAll('.option');
            let isCorrect = false;

            allOptions.forEach((opt, i) => {
                opt.style.pointerEvents = 'none';
                if (i === correct) {
                    opt.classList.add('correct');
                    if (i === selected) isCorrect = true;
                } else if (i === selected) {
                    opt.classList.add('wrong');
                }
            });

            if (isCorrect) {
                totalScore += currentPoints;
                document.getElementById('totalScore').textContent = totalScore.toLocaleString();
                answered.add(cardId);
                
                // Marcar la tarjeta como completada
                const cards = document.querySelectorAll('.card');
                cards.forEach(card => {
                    if (card.textContent.includes(cardId.split('-')[0])) {
                        card.classList.add('completed');
                    }
                });
            }
        }

        function newRandomQuestion() {
            showRandomQuestion(); // Se usa el último cardId guardado implícitamente
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeModal();
        });
    </script>
</body>
</html>
