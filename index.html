Código completo para index.html
Copia todo esto y pégalo en tu archivo index.html:
HTML<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Espacio Galáctico</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            height: 100vh;
            background: linear-gradient(45deg, #0a001f, #1a0033, #000428);
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Fondo galáctico con estrellas */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.15) 0%, transparent 2%),
                radial-gradient(circle at 50% 70%, rgba(255,255,255,0.12) 0%, transparent 2%),
                radial-gradient(circle at 80% 40%, rgba(255,255,255,0.18) 0%, transparent 2%),
                radial-gradient(circle at 30% 80%, rgba(255,255,255,0.1) 0%, transparent 2%);
            background-size: 300px 300px;
            animation: stars 50s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes stars {
            0% { background-position: 0 0; }
            100% { background-position: -300px -300px; }
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(138, 43, 226, 0.8);
        }

        p {
            font-size: 1.3rem;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(138, 43, 226, 0.3);
            border-radius: 15px;
            padding: 25px 15px;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: all 0.4s ease;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        .card:hover {
            transform: translateY(-10px) scale(1.05);
            background: rgba(138, 43, 226, 0.25);
            border-color: #9b59b6;
            box-shadow: 0 0 30px rgba(155, 89, 182, 0.6);
        }

        .card h3 {
            font-size: 1.4rem;
            margin-bottom: 8px;
        }

        .card p {
            font-size: 1rem;
            opacity: 0.85;
        }

        /* Efecto de brillo */
        .card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 40px;
            height: 200%;
            background: linear-gradient(transparent, rgba(255,255,255,0.4), transparent);
            transform: rotate(30deg);
            opacity: 0;
            transition: 0.6s;
        }

        .card:hover::after {
            opacity: 1;
            left: 120%;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌌 GALACTIC HUB</h1>
        <p>Explora las 18 zonas del universo</p>
        
        <div class="grid" id="grid">
            <!-- Las 18 casillas se generan con JavaScript -->
        </div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        
        for (let i = 1; i <= 18; i++) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div>
                    <h3>Zona ${i}</h3>
                    <p>Casilla ${i} • Click para explorar</p>
                </div>
            `;
            
            // Hacerlas clicables
            card.addEventListener('click', () => {
                alert(`¡Has entrado en la Zona ${i} del universo! ✨`);
                // Aquí puedes cambiar el alert por una ventana modal o redirección
            });
            
            grid.appendChild(card);
        }
    </script>
</body>
</html>
