<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONCURSILLO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            background: linear-gradient(45deg, #0a001f, #1a0033, #000428);
            color: white;
            overflow-y: auto;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.15) 0%, transparent 2%),
                        radial-gradient(circle at 50% 70%, rgba(255,255,255,0.12) 0%, transparent 2%),
                        radial-gradient(circle at 80% 40%, rgba(255,255,255,0.18) 0%, transparent 2%);
            background-size: 300px 300px;
            animation: stars 80s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes stars { 0% { background-position: 0 0; } 100% { background-position: -300px -300px; } }

        .container { position: relative; z-index: 2; max-width: 1200px; margin: 0 auto; padding: 30px 20px 100px; text-align: center; }
        h1 { font-size: 3.2rem; margin-bottom: 5px; text-shadow: 0 0 20px rgba(138, 43, 226, 0.8); }

        .score { font-size: 1.8rem; color: #ffd700; margin-bottom: 20px; text-shadow: 0 0 15px rgba(255, 215, 0, 0.6); }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 1100px;
            margin: 30px auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(138, 43, 226, 0.3);
            border-radius: 15px;
            padding: 20px 15px;
            min-height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: all 0.4s ease;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        .card:hover { transform: translateY(-10px) scale(1.05); background: rgba(138, 43, 226, 0.25); }

        .header-card {
            background: rgba(155, 89, 182, 0.3);
            border: 2px solid #ffd700;
            cursor: default;
            font-size: 1.35rem;
            font-weight: bold;
        }

        .money {
            font-size: 2.8rem;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
        }

        .completed { 
            background: rgba(0, 200, 0, 0.25) !important; 
            border-color: #00ff00 !important; 
            pointer-events: none;
        }

        /* Modal Mejorado */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content {
            background: linear-gradient(145deg, #2a0055, #1a0033);
            border: 3px solid #9b59b6;
            border-radius: 20px;
            width: 90%; max-width: 720px; padding: 35px 30px;
            box-shadow: 0 0 50px rgba(155, 89, 182, 0.7);
            position: relative;
        }

        .close {
            position: absolute;
            top: 15px;
            right: 25px;
            font-size: 2.8rem;
            cursor: pointer;
            color: #aaa;
        }

        .modal h2 { 
            color: #ffd700; 
            margin-bottom: 8px; 
            font-size: 1.9rem; 
            text-align: center;
        }

            font-size: 1.2rem
