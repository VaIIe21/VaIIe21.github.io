<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONCURSILLO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
       
        body {
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            background: linear-gradient(45deg, #0a001f, #1a0033, #000428);
            color: white;
            overflow-y: auto;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.15) 0%, transparent 2%),
                        radial-gradient(circle at 50% 70%, rgba(255,255,255,0.12) 0%, transparent 2%),
                        radial-gradient(circle at 80% 40%, rgba(255,255,255,0.18) 0%, transparent 2%);
            background-size: 300px 300px;
            animation: stars 80s linear infinite;
            pointer-events: none;
            z-index: 1;
        }
        @keyframes stars { 0% { background-position: 0 0; } 100% { background-position: -300px -300px; } }
        .container { position: relative; z-index: 2; max-width: 1200px; margin: 0 auto; padding: 30px 20px 100px; text-align: center; }
        h1 { font-size: 3.2rem; margin-bottom: 5px; text-shadow: 0 0 20px rgba(138, 43, 226, 0.8); }
        .score { font-size: 1.8rem; color: #ffd700; margin-bottom: 20px; text-shadow: 0 0 15px rgba(255, 215, 0, 0.6); }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 1100px;
            margin: 30px auto;
        }
        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(138, 43, 226, 0.3);
            border-radius: 15px;
            padding: 20px 15px;
            min-height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: all 0.4s ease;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }
        .card:hover { transform: translateY(-10px) scale(1.05); background: rgba(138, 43, 226, 0.25); }
        .header-card {
            background: rgba(155, 89, 182, 0.3);
            border: 2px solid #ffd700;
            cursor: default;
            font-size: 1.35rem;
            font-weight: bold;
        }
        .money {
            font-size: 2.8rem;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
        }
        .completed {
            background: rgba(0, 200, 0, 0.25) !important;
            border-color: #00ff00 !important;
            pointer-events: none;
        }
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content {
            background: linear-gradient(145deg, #2a0055, #1a0033);
            border: 3px solid #9b59b6;
            border-radius: 20px;
            width: 90%; max-width: 720px; padding: 35px 30px;
            box-shadow: 0 0 50px rgba(155, 89, 182, 0.7);
            position: relative;
        }
        .close {
            position: absolute;
            top: 15px;
            right: 25px;
            font-size: 2.8rem;
            cursor: pointer;
            color: #aaa;
        }
        .modal h2 { color: #ffd700; margin-bottom: 8px; font-size: 1.9rem; text-align: center; }
        .difficulty { font-size: 1.2rem; margin-bottom: 25px; color: #ddd; text-align: center; }
        .option {
            background: rgba(255,255,255,0.1);
            border: 2px solid #9b59b6;
            margin: 12px 0;
            padding: 18px;
            border-radius: 12px;
            font-size: 1.15rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .option:hover { background: rgba(155, 89, 182, 0.3); transform: scale(1.03); }
        .option.selected { border-color: #ffd700; background: rgba(255, 215, 0, 0.15); }
        .option.correct { background: #00cc00; border-color: #00ff00; }
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            min-width: 160px;
        }
        .btn-confirm { background: #00cc00; color: white; }
        .btn-cancel { background: #555; color: white; }
        .btn-new { background: #9b59b6; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>CONCURSILLO</h1>
        <div class="score">Puntuación Total: <span id="totalScore">0</span> 💲</div>
        <div class="grid" id="grid"></div>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">×</span>
            <h2 id="question"></h2>
            <p id="difficulty" class="difficulty"></p>
            <div id="options"></div>
           
            <div class="btn-container" id="confirmation-buttons" style="display: none;">
                <button class="btn btn-confirm" onclick="submitAnswer()">Confirmar Respuesta</button>
                <button class="btn btn-cancel" onclick="cancelSelection()">Cancelar</button>
            </div>
            <div class="btn-container">
                <button class="btn btn-new" onclick="newRandomQuestion()">Nueva Pregunta</button>
                <button class="btn btn-cancel" onclick="closeModal()">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        let totalScore = 0;
        const answered = new Set();

        const categories = ["❤️Nosotros❤️", "🧁Arcane🧁", "🏳️‍🌈Heartsopped🏳️‍🌈"];

        const columns = [
            {
                easy: [
                    { q: "¿Cuál es nuestro nombre favorito para una niña?", a: ["A) Ignacia", "B) Dominga", "C) Antonia", "D) Isha"], c: 1 },
                    { q: "¿Cuándo estamos de aniversario?", a: ["A) 14/Diciembre", "B) 13/Noviembre", "C) 14/Noviembre", "D) 13/Diciembre"], c: 3 },
                    { q: "A qué concierto fuimos juntos", a: ["A) Bad Bunny", "B) Taylor Swift", "C) Big Time Rush", "D) Pailita"], c: 2 }
                ],
                medium: [
                    { q: "¿Qué nombre le pondría a cualquier mascota?", a: ["A) Oliver", "B) Frank Jr", "C) Frank Segundo", "D) Alfred"], c: 3 },
                    { q: "Que película NO hemos visto en el cine", a: ["A) Silent Hills", "B) Fnaf 1", "C) Interestelar", "D) VHS"], c: 1 },
                    { q: "Cuantas veces hemos salido con el Hein y la Kamy", a: ["A) 1", "B) 2", "C) 3", "D) 4"], c: 1 }
                ],
                hard: [
                    { 
                        q: "Que regalo que te eh echo es el que más te ha gustado", 
                        a: ["A) Ipad", "B) Concierto BTR", "C) Lampara Flor", "D) Libros"], 
                        c: 0, 
                        allCorrect: true 
                    }
                ]
            },
            { easy: [], medium: [], hard: [] },
            { easy: [], medium: [], hard: [] }
        ];

        let currentQuestions = [];
        let currentLevel = '';
        let currentPoints = 0;
        let selectedAnswer = -1;
        let currentCardId = null;
        let currentCardElement = null;

        const grid = document.getElementById('grid');

        for (let row = 0; row < 6; row++) {
            for (let col = 0; col < 3; col++) {
                const card = document.createElement('div');
                const cardId = `${row}-${col}`;

                if (row === 0) {
                    card.className = 'card header-card';
                    card.innerHTML = `<div><h3>${categories[col]}</h3></div>`;
                } else {
                    let difficulty = (row <= 2) ? 'easy' : (row <= 4) ? 'medium' : 'hard';
                    let points = difficulty === 'easy' ? 2000 : difficulty === 'medium' ? 5000 : 10000;

                    card.className = 'card';
                    card.dataset.id = cardId;
                    card.innerHTML = `<div class="money">${points} 💲</div>`;

                    card.addEventListener('click', () => {
                        if (answered.has(cardId)) {
                            alert("Ya respondiste esta casilla.");
                            return;
                        }
                        currentQuestions = columns[col][difficulty];
                        currentLevel = difficulty === 'easy' ? 'Fácil' : difficulty === 'medium' ? 'Medio' : 'Difícil';
                        currentPoints = points;
                        currentCardId = cardId;
                        currentCardElement = card;
                        showRandomQuestion();
                    });
                }
                grid.appendChild(card);
            }
        }

        function showRandomQuestion() {
            if (currentQuestions.length === 0) {
                alert("No hay preguntas en este nivel todavía.");
                return;
            }
            const randomIndex = Math.floor(Math.random() * currentQuestions.length);
            const q = currentQuestions[randomIndex];
           
            document.getElementById('question').textContent = q.q;
            document.getElementById('difficulty').textContent = `Nivel: ${currentLevel} — ${currentPoints} 💲`;
           
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            selectedAnswer = -1;

            q.a.forEach((answer, idx) => {
                const option = document.createElement('div');
                option.className = 'option';
                option.textContent = answer;
                option.onclick = () => selectAnswer(idx, option, q);
                optionsDiv.appendChild(option);
            });
           
            document.getElementById('confirmation-buttons').style.display = 'none';
            document.getElementById('modal').style.display = 'flex';
        }

        function selectAnswer(index, element, question) {
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            selectedAnswer = index;
            document.getElementById('confirmation-buttons').style.display = 'block';
        }

        function submitAnswer() {
            if (selectedAnswer === -1) return;

            const allOptions = document.querySelectorAll('.option');
            const currentQuestion = currentQuestions.find(q => q.q === document.getElementById('question').textContent);
            const isAllCorrect = currentQuestion && currentQuestion.allCorrect;

            allOptions.forEach((opt, i) => {
                opt.style.pointerEvents = 'none';
                if (isAllCorrect || i === selectedAnswer) {
                    opt.classList.add('correct');
                } else if (i === selectedAnswer) {
                    opt.classList.add('wrong');
                }
            });

            if (currentCardElement) {
                totalScore += currentPoints;
                document.getElementById('totalScore').textContent = totalScore.toLocaleString();
                answered.add(currentCardId);
                currentCardElement.classList.add('completed');
            }

            document.getElementById('confirmation-buttons').style.display = 'none';
        }

        function cancelSelection() {
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            document.getElementById('confirmation-buttons').style.display = 'none';
            selectedAnswer = -1;
        }

        function newRandomQuestion() {
            showRandomQuestion();
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            cancelSelection();
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeModal();
        });
    </script>
</body>
</html>
